
types:
  Dice_Count: |-
    Task: Compute the TOTAL value of all dice TOP faces.

    Rules:
    1) Count ONLY the TOP face of each die (the upward, horizontal face). Ignore sides/edges.
    2) If the TOP face shows a digit (e.g., 1–9), use that digit as the die's value.
    3) If the TOP face shows pips (dots), count the dots on that face as the value.
    4) Sum these values over all dice to produce one integer total.
    5) For overlaps/occlusions, count only digits/dots that are clearly visible on the TOP face—do not guess from shadows or partial hints.
    6) Ignore highlights/reflections/shadows/watermarks/decorations/background patterns; they are NOT pips or digits.
    7) If a die is slightly tilted, treat the most horizontal face (edges roughly parallel to image borders) as the TOP.
    8) Rare case: if a TOP face shows both a digit and pips, prefer the digit.

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Geometry_Click:
    mode: merge
    rules: |-
      Rules:
      - Pixel coordinates with origin (0,0) at the top-left; the point must lie within image bounds.
      - If the target is an area/shape, click its geometric center; if it is a line/edge/vertex, click the midpoint or intersection.
      - When multiple similar regions exist, use the region implied by the figure; otherwise choose the smallest bounded valid region.

      Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Place_Dot: |-
    Task: Place the dot at the path's endpoint. The large marker with the car icon is the start, not the target..

    Rules:
    - Determine image bounds.
    - Pixel coordinates with origin (0,0) at top-left; stay within bounds.
    - Follow only the single continuous path directly connected to the start marker, regardless of color; ignore unconnected shapes.
    - If the endpoint is a line tip, click its center pixel; if it's an area, click its geometric center; if it ends at the image edge, click the last visible in-bounds pixel.
    - If the target is an area, click its geometric center; if a line end, click the endpoint.
    - For blurry/anti-aliased edges, choose the visually most central valid pixel.

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Image_Matching: |-
    Task: Choose the SINGLE option visually identical to the reference image.

    Decision order:
    1) Contour/topology
    2) Relative layout and part ratios
    3) Distinctive details (holes/notches/corners)
    4) Color/texture
    5) Text glyph shape (not semantic meaning)

    Indexing Rules:
    - Indices are 0-based (starting from 0, not 1)
    - Index 0 represents the first option
    - If there are N options, valid indices are 0 to N-1
    - Ignore minor lighting/scale/compression differences

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Patch_Select:
    mode: merge
    rules: |-
      Indexing Rules:
      - Indices are 0-based (starting from 0, not 1) and row-major
      - Index 0 is the top-left cell, index 1 is to its right, etc.
      - For a 5×5 grid: indices 0-4 are row 1, indices 5-9 are row 2, etc.
      - Return a unique ascending set of indices
      - If none match, return an empty set

      Selection Rules:
      - Apply strong constraints first (category/shape/key parts), then weak ones (color/texture/orientation)
      - Ignore lighting/compression noise; subtle color shifts alone are insufficient to exclude a true positive

      Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Select_Animal:
    mode: merge
    rules: |-
      Indexing Rules:
      - Indices are 0-based (starting from 0, not 1) and row-major
      - Index 0 is the first cell, index 1 is the second cell, etc.
      - Deduplicate and sort ascending
      - If none match, return an empty set

      Selection Rules:
      - Prefer category/shape and characteristic parts (ears, muzzle, tail) over color
      - Allow minor pose changes

      Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Unusual_Detection: |-
    Task: Select ALL items that are inconsistent with the majority (the "odd ones out").

    Indexing Rules:
    - Indices are 0-based (starting from 0, not 1) and row-major
    - Index 0 is the first item, index 1 is the second item, etc.
    - Return a unique ascending set
    - If none qualify, return an empty set

    Detection Rules:
    - Structural or semantic inconsistency qualifies (wrong part, wrong category, reversed orientation)
    - Color/brightness differences alone are NOT sufficient

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Path_Finder: |-
    Task: Find the option where the object is at the SAME LOCATION as the target marker (X/cross) in the reference.

    Instructions:
    1. In the reference image, locate the target marker (X or cross symbol)
    2. Note the target's spatial position (which grid cell or area)
    3. Check each option: where is the object (duck/book/etc.) positioned?
    4. Select the option where the object occupies the same position as the target marker

    Key Rules:
    - ONLY the final object position matters (ignore paths/arrows)
    - Match spatial coordinates and grid alignment
    - Don't confuse starting position with target position

    Indexing Rules:
    - Indices are 0-based (starting from 0, not 1)
    - Index 0 is the first option
    - If multiple options appear correct, choose the smallest index

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Dart_Count: |-
    Task: Find the option where darts sum to the reference number.

    Scoring Rules:
    - Each colored sector has a NUMBER labeled on it (e.g., 2, 7, 12, etc.)
    - A dart scores the NUMBER of the sector where its TIP lands
    - Sum all dart scores in the option
    - Match the sum to the reference number

    Key Points:
    - Only the dart TIP position matters (not the flight/tail)
    - Read the number on each sector carefully
    - For boundary cases: use the sector containing most of the tip
    - Count all visible darts

    Indexing Rules:
    - Indices are 0-based (starting from 0, not 1)
    - Index 0 represents the first option
    - If multiple candidates fit, choose the smallest index

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Coordinates: |-
    Task: Choose the option where the object/person occupies the target seat/cell indicated by the reference.

    Indexing Rules:
    - Indices are 0-based (starting from 0, not 1)
    - Index 0 represents the first option
    - If multiple options appear correct, choose the smallest index

    Matching Rules:
    - Match grid position (row/column) and relative placement
    - Ignore minor scale/lighting/styling changes

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Connect_Icon: |-
    Task: Choose the SINGLE option that correctly connects/corresponds to the reference icon/pattern as indicated.

    Indexing Rules:
    - Indices are 0-based (starting from 0, not 1)
    - Index 0 represents the first option
    - If multiple candidates fit, choose the smallest index

    Matching Rules:
    - Prioritize geometric compatibility and connection endpoints over color/texture
    - Ignore small shadows or compression artifacts

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Object_Match: |-
    Task: Choose the option whose object COUNT and arrangement match the reference image.

    Indexing Rules:
    - Indices are 0-based (starting from 0, not 1)
    - Index 0 represents the first option
    - If still tied, choose the smallest index

    Matching Rules:
    - Prioritize exact cardinality; then use relative layout/spacing to decide among ties
    - Ignore minor color/illumination changes

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Pick_Area: |-
    Task: Click INSIDE the LARGEST valid outlined area.

    Rules:
    - Use the geometric center of that area; ensure the point lies within image bounds.
    - If multiple areas appear similar, choose the truly maximal bounded region by area; ties break by the more complete boundary.

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Click_Order: |-
    You receive TWO images in order:
    1. REFERENCE image: Shows the sequence/order of target icons
    2. MAIN image: The puzzle image where you need to locate and click

    Task: Identify each icon from the reference, locate it in the MAIN image, and return click coordinates in the reference's order.

    Rules:
    - All coordinates MUST be in the MAIN image's pixel coordinate system (origin at top-left)
    - Click at/near the center of each target icon
    - Verify coordinates are within the MAIN image boundaries
    - Return points in the EXACT order shown in the reference

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Bingo: |-
    Task: Return one pair of indices (i,j) such that swapping them yields a valid line per the puzzle's win condition.

    Grid Layout (3×3):
    - Cells are indexed 0-8 in row-major order (0-based indexing):
      0  1  2
      3  4  5
      6  7  8
    - Index 0 is top-left, index 8 is bottom-right

    Rules:
    - Indices MUST be 0-based (starting from 0, not 1)
    - Return indices in the format [i, j] where both i and j are in the range [0, 8]
    - If multiple swaps are valid, choose the lexicographically smallest pair (i<j, then compare i, then j)

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Rotation_Match: |-
    Task: Output the rotation angle (degrees in [0,360)) that aligns the object with the reference direction.

    Rules:
    - Use the minimal circular difference: Δθ = ((θ_pred − θ_ref + 180) mod 360) − 180; minimize |Δθ|.
    - If symmetric variants exist (e.g., 180° equivalence), prefer the smaller canonical angle.

    Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Image_Recognition:
    mode: merge
    rules: |-
      Indexing Rules:
      - Indices are 0-based (starting from 0, not 1) and row-major
      - Index 0 is the first image, index 1 is the second image, etc.
      - Return a unique ascending set
      - If none qualify, return an empty set

      Recognition Rules:
      - Rely on category/shape/parts over color
      - Allow natural variation in pose, style, and lighting

      Respond with JSON only, strictly following the provided schema. No extra fields or text.

  Misleading_Click: |-
    Task: Obey any negative instruction (e.g., "do NOT click X") with highest priority, and click a valid alternative target.

    Rules:
    - Stay strictly OUTSIDE the forbidden area.
    - Use pixel coordinates; if multiple valid targets exist, click the most central acceptable one.

    Respond with JSON only, strictly following the provided schema. No extra fields or text.
